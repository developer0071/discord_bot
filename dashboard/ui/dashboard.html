<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moonlight Soldiers - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fa-solid fa-moon"></i>
                </div>
                <h2>Moonlight</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active"><i class="fa-solid fa-users"></i> Members</a>
                <a href="#" class="nav-item"><i class="fa-solid fa-chart-line"></i> Analytics</a>
                <a href="#" class="nav-item"><i class="fa-solid fa-clock-rotate-left"></i> Audit Log</a>
                <a href="#" class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
            </nav>
            <div class="sidebar-footer">
                <div class="admin-profile">
                    <img src="https://ui-avatars.com/api/?name=Admin&background=random" alt="Admin">
                    <div class="admin-info">
                        <span class="admin-name">Admin</span>
                        <span class="admin-role">System Admin</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div class="search-bar">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search users by name...">
                </div>
                <div class="topbar-actions">
                    <button class="btn-icon"><i class="fa-solid fa-bell"></i></button>
                    <button class="btn-primary" onclick="showBulkOperations()"><i class="fa-solid fa-bolt"></i> Bulk Operations</button>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="page-header">
                    <h1>Server Members</h1>
                    <p class="subtitle">Manage user ranks, levels, and experience points in real-time.</p>
                </div>

                <div class="stats-cards">
                    <div class="stat-card glass-panel">
                        <div class="stat-icon"><i class="fa-solid fa-users"></i></div>
                        <div class="stat-info">
                            <h3>Total Members</h3>
                            <h2 id="totalMembers">--</h2>
                        </div>
                    </div>
                    <div class="stat-card glass-panel">
                        <div class="stat-icon gold"><i class="fa-solid fa-star"></i></div>
                        <div class="stat-info">
                            <h3>Total XP Awarded</h3>
                            <h2 id="totalXpAwarded">--</h2>
                        </div>
                    </div>
                    <div class="stat-card glass-panel">
                        <div class="stat-icon purple"><i class="fa-solid fa-crown"></i></div>
                        <div class="stat-info">
                            <h3>Highest Level</h3>
                            <h2 id="highestLevel">--</h2>
                        </div>
                    </div>
                </div>

                <div class="users-grid" id="usersGrid">
                    <!-- Loading state -->
                    <div class="loading-spinner"><i class="fa-solid fa-circle-notch fa-spin"></i></div>
                </div>
            </div>
        </main>

        <!-- Audit Log Panel (Hidden by default) -->
        <aside class="audit-panel glass-panel" id="auditPanel">
            <div class="audit-header">
                <h3><i class="fa-solid fa-clock-rotate-left"></i> Recent Activity</h3>
                <button class="btn-icon" onclick="toggleAuditPanel()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="audit-timeline" id="auditTimeline">
                <!-- Timeline items here -->
            </div>
        </aside>
    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="actionModal">
        <div class="modal glass-panel">
            <div class="modal-header">
                <h3 id="modalTitle">Modify User</h3>
                <button class="btn-icon" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="modalUserId">
                <input type="hidden" id="modalAction">
                
                <div class="form-group" id="xpAmountGroup">
                    <label>Amount (XP)</label>
                    <input type="number" id="xpAmountInput" class="form-control" placeholder="e.g. 500">
                </div>
                
                <div class="form-group">
                    <label>Reason (Optional)</label>
                    <input type="text" id="reasonInput" class="form-control" placeholder="e.g. Event winner">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn-primary" id="confirmActionBtn" onclick="confirmAction()">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Replace standard alert with custom toast notifications -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="user-card.js"></script>
</body>
</html>
